<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Validation des billets</title>
  <style>
    :root {
      --bg: #f4f4f2;
      --surface: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --border: #d6d3d1;
      --success-bg: #dcfce7;
      --success-text: #166534;
      --warning-bg: #fef3c7;
      --warning-text: #92400e;
      --error-bg: #fee2e2;
      --error-text: #991b1b;
      --neutral-bg: #e5e7eb;
      --neutral-text: #374151;
      --primary: #0f766e;
      --primary-hover: #115e59;
      --radius: 16px;
      --shadow: 0 10px 30px rgba(0,0,0,.08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, Arial, sans-serif;
      background: linear-gradient(180deg, #f8fafc 0%, var(--bg) 100%);
      color: var(--text);
      min-height: 100vh;
    }

    .wrap {
  max-width: 520px;
  margin: 0 auto;
  padding: 20px 16px 40px;
}

.header {
  margin-bottom: 20px;
  text-align: center;
}

.logo {
  display: block;
  width: 400px;
  max-width: 100%;
  height: auto;
  margin: 0 auto 20px;
}

.result-title {
  font-size: 20px;
  font-weight: 700;
  margin: 36px 0 6px;
  color: #163860;
  text-align: center;
}

.result-message {
  margin: 0;
  color: #163860;
  font-size: 15px;
  line-height: 1.5;
  text-align: center;
}

.actions {
  margin-top: 16px;
  text-align: center;
}

.btn-primary {
  display: inline-block;
  background: #163860;
  color: #fff;
  padding: 14px 22px;
  border-radius: 12px;
  font-size: 16px;
}

.btn-primary:hover {
  background: #0f2c4d;
}
    @media (max-width: 420px) {
      h1 { font-size: 15px; }
      .result-title { font-size: 15px; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="header">
      <img src="logo.png" alt="Le Figaro Store" class="logo">
      <h1>Validation des billets</h1>
    </section>

    <section class="card">
      <div class="reader-shell">
        <div id="reader"></div>

        <div id="result" class="result neutral" aria-live="polite">
          <p class="result-title">Prêt à scanner</p>
          <p class="result-message">Autorisez la caméra, puis présentez un billet devant l’objectif.</p>
        </div>

        <div class="actions">
          <button id="resumeBtn" class="btn-primary" type="button">Scanner de nouveau</button>
        </div>
      </div>
    </section>
  </main>

  <script src="https://unpkg.com/html5-qrcode" defer></script>
  <script>
    window.addEventListener('load', function () {
      const resultBox = document.getElementById('result');
      const resumeBtn = document.getElementById('resumeBtn');
      let scanner;
      let lock = false;
      let lastScan = null;
      let audioCtx;

      function beep(type) {
        try {
          audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
          const oscillator = audioCtx.createOscillator();
          const gain = audioCtx.createGain();
          oscillator.connect(gain);
          gain.connect(audioCtx.destination);
          oscillator.type = 'sine';
          oscillator.frequency.value = type === 'success' ? 880 : type === 'warning' ? 540 : 280;
          gain.gain.setValueAtTime(0.001, audioCtx.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.08, audioCtx.currentTime + 0.01);
          gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.18);
          oscillator.start();
          oscillator.stop(audioCtx.currentTime + 0.2);
        } catch (e) {}
      }

      function setResult(type, title, message, meta) {
        resultBox.className = 'result ' + type;
        resultBox.innerHTML = `
          <p class="result-title">${title}</p>
          <p class="result-message">${message || ''}</p>
          ${meta ? `<div class="result-meta">${meta}</div>` : ''}
        `;
      }

      async function validateCode(decodedText) {
        if (lock || decodedText === lastScan) return;
        lock = true;
        lastScan = decodedText;
        setResult('neutral', 'Vérification en cours', 'Le billet est en train d’être contrôlé.', `Code scanné : <code>${decodedText}</code>`);

        try {
          const response = await fetch('/api/tickets/validate', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ code: decodedText })
          });

          const data = await response.json();

          if (data.status === 'valid') {
            beep('success');
            setResult('valid', 'Billet valide', data.message || 'Accès autorisé.', `${data.holder || ''} ${data.ticket_id ? '• ' + data.ticket_id : ''}`.trim());
          } else if (data.status === 'used') {
            beep('warning');
            setResult('used', 'Billet déjà scanné', data.message || 'Ce billet a déjà été utilisé.', `${data.holder || ''} ${data.ticket_id ? '• ' + data.ticket_id : ''}`.trim());
          } else {
            beep('error');
            setResult('invalid', 'Billet invalide', data.message || 'Le billet est inconnu, annulé ou non payé.', `${data.ticket_id || ''}`);
          }
        } catch (error) {
          beep('error');
          setResult('invalid', 'Erreur de connexion', 'Impossible de joindre l’API de validation.');
        }

        setTimeout(() => {
          lock = false;
          lastScan = null;
        }, 1800);
      }

      resumeBtn.addEventListener('click', function () {
        lock = false;
        lastScan = null;
        setResult('neutral', 'Prêt à scanner', 'Présentez un billet devant l’objectif.');
      });

      function startScanner() {
        scanner = new Html5QrcodeScanner('reader', {
          fps: 10,
          qrbox: { width: 250, height: 250 },
          rememberLastUsedCamera: true,
          supportedScanTypes: [Html5QrcodeScanType.SCAN_TYPE_CAMERA]
        }, false);

        scanner.render(
          function success(decodedText) { validateCode(decodedText); },
          function error() {}
        );
      }

      startScanner();
    });
  </script>
</body>
</html>
